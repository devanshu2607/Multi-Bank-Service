_format_version: "3.0"

services:
  - name: auth-service
    url: http://auth-service:8081
    routes:
      - name: auth-route
        paths: ["/api/auth"]
        strip_path: false

  - name: user-service
    url: http://user-service:8082
    routes:
      - name: user-route
        paths: ["/api/users"]
        strip_path: false

  - name: bank-service
    url: http://bank-service:8083
    routes:
      - name: bank-route
        paths: ["/api/accounts"]
        strip_path: false

  - name: upi-service
    url: http://upi-service:8084
    routes:
      - name: upi-route
        paths: ["/api/upi"]
        strip_path: false

  - name: npci-service
    url: http://npci-service:8085
    routes:
      - name: npci-route
        paths: ["/api/npci"]
        strip_path: false

  - name: payment-service
    url: http://payment-service:8086
    routes:
      - name: payment-route
        paths: ["/api/payments"]
        strip_path: false

  - name: ledger-service
    url: http://ledger-service:8087
    routes:
      - name: ledger-route
        paths: ["/api/ledger"]
        strip_path: false

  - name: notification-service
    url: http://notification-service:8088
    routes:
      - name: notification-route
        paths: ["/api/notifications"]
        strip_path: false
